services:
  - type: web
    name: va-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: va-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

  - type: static
    name: va-dashboard
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/va-dashboard run build
    staticPublishPath: artifacts/va-dashboard/dist
    envVars:
      - key: VITE_API_BASE
        value: https://va-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: va-postgres
    plan: free
    databaseName: va_manager
    region: oregon
