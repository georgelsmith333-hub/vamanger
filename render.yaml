services:
  - type: web
    name: va-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_PROJECT_ID
        value: vamanager-494602
      - key: GOOGLE_CLIENT_ID
        value: 97949089714-sgdjdaadv81egajru7qhdmu7g6843e19.apps.googleusercontent.com
      - key: GOOGLE_SHEET_ID
        value: 1EyUzVtqciLVImF9prX7FrCCSAdyaKkj_l2Un2UDB2TA
      - key: ALLOWED_ORIGINS
        value: https://va-client-manager.pages.dev,https://www.va-client-manager.pages.dev
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_SA_EMAIL
        sync: false
      - key: GOOGLE_SA_PRIVATE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: va-postgres
          property: connectionString

databases:
  - name: va-postgres
    plan: free
    databaseName: va_manager
    region: oregon
