      summary: Create eBay account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEbayAccountBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EbayAccount"

  /ebay-accounts/{id}:
    get:
      operationId: getEbayAccount
      tags: [ebay-accounts]
      summary: Get eBay account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: eBay account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EbayAccount"
        "404":
          description: Not found
    patch:
      operationId: updateEbayAccount
      tags: [ebay-accounts]
      summary: Update eBay account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEbayAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EbayAccount"
    delete:
      operationId: deleteEbayAccount
      tags: [ebay-accounts]
      summary: Delete eBay account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

