components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    DashboardSummary:
      type: object
      properties:
        totalClients:
          type: integer
        activeClients:
          type: integer
        totalEbayAccounts:
          type: integer
        accountsWithIssues:
          type: integer
        overdueInvoicesCount:
          type: integer
        overdueInvoicesAmount:
          type: number
        pendingTasksCount:
          type: integer
        overdueTasksCount:
          type: integer
        expiringCardsCount:
          type: integer
        openViolationsCount:
          type: integer
        totalRevenueThisMonth:
          type: number
        totalExpensesThisMonth:
          type: number
        netProfitThisMonth:
          type: number
      required:
        - totalClients
        - activeClients
        - totalEbayAccounts
        - accountsWithIssues
        - overdueInvoicesCount
        - overdueInvoicesAmount
        - pendingTasksCount
        - overdueTasksCount
        - expiringCardsCount
        - openViolationsCount
        - totalRevenueThisMonth
        - totalExpensesThisMonth
        - netProfitThisMonth

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        clientName:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, type, description, createdAt]

    Client:
      type: object
      properties:
        id:
          type: integer
        clientName:
          type: string
        businessBrand:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        onboardedOn:
          type: ["string", "null"]
        status:
          type: string
        hourlyRate:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        ebayAccountsCount:
          type: integer
        totalSales:
          type: ["number", "null"]
        lastContact:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, clientName, status, ebayAccountsCount, createdAt, updatedAt]

    CreateClientBody:
      type: object
      properties:
        clientName:
          type: string
        businessBrand:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        onboardedOn:
          type: ["string", "null"]
        status:
          type: string
        hourlyRate:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        totalSales:
          type: ["number", "null"]
        lastContact:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required: [clientName, status]

    UpdateClientBody:
      type: object
      properties:
        clientName:
          type: ["string", "null"]
        businessBrand:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        onboardedOn:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        hourlyRate:
          type: ["number", "null"]
        currency:
          type: ["string", "null"]
        totalSales:
          type: ["number", "null"]
        lastContact:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]

    EbayAccount:
      type: object
      properties:
        id:
          type: integer
        clientId:
          type: integer
        clientName:
          type: string
        ebayUsername:
          type: string
        ebayEmail:
          type: ["string", "null"]
        ebayPassword:
          type: ["string", "null"]
        marketplace:
          type: ["string", "null"]
        accountType:
          type: ["string", "null"]
        accountHealth:
          type: ["string", "null"]
        feedbackScore:
          type: ["integer", "null"]
        topRated:
          type: boolean
        activeListings:
          type: ["integer", "null"]
        sellingLimit:
          type: ["number", "null"]
        mcRestriction:
